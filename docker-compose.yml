version: "3.9"

networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.100.0/24
          gateway: 192.168.100.1

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: workspace_agent
      POSTGRES_PASSWORD: workspace_agent_secret
      POSTGRES_DB: workspace_security
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workspace_agent -d workspace_security"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://workspace_agent:workspace_agent_secret@postgres:5432/workspace_security
      APP_ENV: dev
      SUPPORT_EMAIL: support@example.com
      ACTION_FLAG: "false"
      DOMAIN: example.com
      LOOKBACK_MINUTES: "15"
      SEVERITY_THRESHOLD: "70"
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
